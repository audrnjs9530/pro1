<!DOCTYPE html>
<html lang="ko-kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChartWave 🎵</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:     #0a0a0f;
            --bg-surface:  #12121a;
            --bg-card:     #1a1a26;
            --accent:      #e8ff47;
            --accent-dim:  #b8cc30;
            --pink:        #ff4d8d;
            --blue:        #4d9fff;
            --text-primary:#f0f0f0;
            --text-muted:  #6b6b8a;
            --border:      rgba(255,255,255,0.07);
            --nav-h:       64px;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 40% at 50% -10%, rgba(232,255,71,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 30% at 90% 80%, rgba(77,159,255,0.06) 0%, transparent 60%);
        }

        /* ──────────── NAV ──────────── */
        .navbar-chart {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: var(--nav-h);
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 2rem;
        }

        .nav-brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.08em;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: opacity 0.2s;
        }
        .nav-brand:hover { opacity: 0.8; color: var(--accent); }
        .nav-brand .dot {
            width: 8px; height: 8px;
            background: var(--pink);
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.4s ease-in-out infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.2; }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex: 1;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            background: rgba(255,255,255,0.07);
        }
        .nav-links a.active { color: var(--accent); }

        .nav-search {
            position: relative;
        }
        .nav-search input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.82rem;
            padding: 0.38rem 1rem 0.38rem 2.2rem;
            width: 200px;
            transition: all 0.3s;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .nav-search input::placeholder { color: var(--text-muted); }
        .nav-search input:focus {
            outline: none;
            border-color: var(--accent);
            width: 260px;
            background: rgba(232,255,71,0.05);
        }
        .nav-search svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .nav-upload-btn {
            background: var(--accent);
            color: #000 !important;
            font-weight: 700 !important;
            border-radius: 20px !important;
            padding: 0.4rem 1.1rem !important;
            font-size: 0.82rem !important;
            letter-spacing: 0.03em;
            transition: all 0.2s !important;
        }
        .nav-upload-btn:hover {
            background: var(--accent-dim) !important;
            color: #000 !important;
            transform: translateY(-1px);
        }

        /* ──────────── MAIN ──────────── */
        .main-wrapper {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* ──────────── FOOTER ──────────── */
        footer {
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.78rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar-chart">
    <a href="{% url 'music-list' %}" class="nav-brand">
        CHARTWAVE <span class="dot"></span>
    </a>

    <div class="nav-links">
        <a href="/" class="active">차트</a>
        <a href="/music/">최신 음악</a>
        <a href="/genre/">장르</a>
        <a href="/artists/">아티스트</a>
    </div>

    <div class="nav-search">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415zm-5.242 1.156a5 5 0 1 1 0-10 5 5 0 0 1 0 10"/>
        </svg>
        <input type="text" placeholder="음악, 아티스트 검색...">
    </div>

    <a href="/music/upload/" class="nav-links nav-upload-btn">+ 업로드</a>
</nav>

<!-- CONTENT -->
<div class="main-wrapper">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer>
    © 2025 ChartWave · 음악이 있는 곳
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
