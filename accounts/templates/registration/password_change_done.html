{% extends 'base.html' %}

{% block content %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 64px - 8rem);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1rem;
    }
    .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 3rem 2.5rem;
        text-align: center;
        animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .success-ring {
        width: 80px; height: 80px;
        border-radius: 50%;
        background: rgba(232,255,71,0.1);
        border: 2px solid rgba(232,255,71,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.8rem;
        font-size: 2rem;
        animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
    }
    @keyframes pop {
        from { transform: scale(0.5); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
    }

    .auth-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.3rem;
        letter-spacing: 0.1em;
        color: var(--accent);
        margin-bottom: 0.5rem;
    }
    .done-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.2rem;
        letter-spacing: 0.05em;
        color: var(--text-primary);
        margin: 0 0 0.6rem;
    }
    .done-sub {
        color: var(--text-muted);
        font-size: 0.85rem;
        line-height: 1.7;
        margin-bottom: 2rem;
    }
    .btn-auth {
        display: block;
        width: 100%;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 12px;
        padding: 0.8rem;
        font-size: 0.9rem;
        font-weight: 700;
        font-family: 'Noto Sans KR', sans-serif;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        margin-bottom: 0.8rem;
    }
    .btn-auth:hover {
        background: var(--accent-dim);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(232,255,71,0.25);
        color: #000;
    }
    .btn-secondary {
        display: block;
        width: 100%;
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.8rem;
        font-size: 0.85rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
    }
    .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
    }
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="success-ring">✓</div>
        <div class="auth-logo">CHARTWAVE</div>
        <h1 class="done-title">변경 완료!</h1>
        <p class="done-sub">
            비밀번호가 성공적으로 변경되었습니다.<br>
            새 비밀번호로 로그인해 주세요.
        </p>
        <a href="{% url 'login' %}" class="btn-auth">로그인하러 가기</a>
        <a href="/" class="btn-secondary">홈으로 돌아가기</a>
    </div>
</div>
{% endblock %}
